<div class="hero-art" aria-hidden="true">
  <div class="void-glow"></div>

  <svg
    viewBox="0 0 500 500"
    xmlns="http://www.w3.org/2000/svg"
    class="dragon-svg"
  >

    <defs>

      <radialGradient id="voidGlow">
        <stop offset="0%" stop-color="#6d28d9" stop-opacity=".45"/>
        <stop offset="45%" stop-color="#4c1d95" stop-opacity=".18"/>
        <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
      </radialGradient>

      <linearGradient
        id="dragonGradient"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%"
      >
        <stop offset="0%" stop-color="#c084fc"/>
        <stop offset="40%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#2e1065"/>
      </linearGradient>

      <filter id="dragonGlow">
        <feGaussianBlur
          stdDeviation="5"
          result="blur"
        />

        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

    </defs>


    <!-- Purple void -->

    <circle
